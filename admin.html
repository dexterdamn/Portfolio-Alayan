<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Messages | Dexter Alayan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/admin.css" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getFirestore, collection, doc, addDoc, updateDoc, onSnapshot, orderBy, query, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB2eyFICdxcJMfqHb_p0n8kdNIh31qbNE0",
      authDomain: "database-portfolio-442f7.firebaseapp.com",
      projectId: "database-portfolio-442f7",
      storageBucket: "database-portfolio-442f7.firebasestorage.app",
      messagingSenderId: "1061936178768",
      appId: "1:1061936178768:web:ff6467e6e672e7bb419355",
      measurementId: "G-XRNWJRT875"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window._db = db;
    window._fbCol = collection;
    window._fbDoc = doc;
    window._fbAddDoc = addDoc;
    window._fbUpdateDoc = updateDoc;
    window._fbOnSnapshot = onSnapshot;
    window._fbOrderBy = orderBy;
    window._fbQuery = query;
    window._fbServerTs = serverTimestamp;
    window._firebaseReady = true;
    document.dispatchEvent(new Event("firebase-ready"));
  </script>
</head>
<body>
  <div id="password-gate" class="gate-screen">
    <div class="gate-box">
      <p class="gate-label">Admin Access</p>
      <h1>Message panel</h1>
      <p class="gate-text">Enter your admin password to review contact messages.</p>
      <input class="gate-input" type="password" id="gate-pw" placeholder="Password" onkeydown="if(event.key==='Enter') checkPassword()" />
      <button class="gate-btn" type="button" onclick="checkPassword()">Enter</button>
      <div class="gate-error" id="gate-error">Wrong password. Try again.</div>
    </div>
  </div>

  <div id="admin-ui" class="admin-ui" style="display: none;">
    <header class="admin-header">
      <div>
        <p class="admin-label">Dexter Alayan</p>
        <h1>Contact Messages</h1>
      </div>
      <div class="admin-badge">Firebase Live</div>
    </header>

    <div class="admin-body">
      <aside class="conversation-list" id="conv-list">
        <div class="conversation-header">Conversations</div>
        <div class="no-conv" id="no-conv">No messages yet.</div>
      </aside>

      <section class="message-panel" id="chat-panel">
        <div class="panel-empty" id="panel-empty">Select a conversation from the left side.</div>
        <div id="panel-active" class="panel-active" style="display: none;">
          <div class="panel-top">
            <div>
              <h2 id="panel-name">-</h2>
              <p id="panel-email">-</p>
            </div>
          </div>
          <div class="messages-area" id="messages-area"></div>
          <div class="reply-bar">
            <input class="reply-input" type="text" id="reply-input" placeholder="Type your reply..." onkeydown="if(event.key==='Enter') sendReply()" />
            <button class="reply-btn" type="button" onclick="sendReply()">Send</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script>
    const ADMIN_PASSWORD = "dexter2025";
    let activeConvId = null;
    let msgUnsubscribe = null;
    const renderedIds = new Set();

    function checkPassword() {
      const pw = document.getElementById("gate-pw").value;
      if (pw === ADMIN_PASSWORD) {
        document.getElementById("password-gate").style.display = "none";
        const ui = document.getElementById("admin-ui");
        ui.style.display = "flex";
        if (window._firebaseReady) loadConversations();
        else document.addEventListener("firebase-ready", loadConversations);
      } else {
        document.getElementById("gate-error").style.display = "block";
        document.getElementById("gate-pw").value = "";
      }
    }

    function loadConversations() {
      const conversationQuery = window._fbQuery(
        window._fbCol(window._db, "conversations"),
        window._fbOrderBy("createdAt", "desc")
      );

      window._fbOnSnapshot(conversationQuery, snapshot => {
        const list = document.getElementById("conv-list");
        list.querySelectorAll(".conv-item").forEach(el => el.remove());
        document.getElementById("no-conv").style.display = snapshot.empty ? "block" : "none";

        snapshot.forEach(docSnap => {
          const data = docSnap.data();
          const item = document.createElement("button");
          item.type = "button";
          item.className = `conv-item${data.unread ? " unread" : ""}${docSnap.id === activeConvId ? " active" : ""}`;
          item.dataset.id = docSnap.id;
          item.innerHTML = `
            <span class="conv-name">${data.visitorName || "Unknown"}</span>
            <span class="conv-email">${data.visitorEmail || ""}</span>
            <span class="conv-last">${data.lastMessage || "No messages yet"}</span>
          `;
          item.onclick = () => openConversation(docSnap.id, data);
          list.appendChild(item);
        });
      });
    }

    function openConversation(id, data) {
      activeConvId = id;
      document.querySelectorAll(".conv-item").forEach(el => {
        el.classList.toggle("active", el.dataset.id === id);
      });
      document.getElementById("panel-empty").style.display = "none";
      const active = document.getElementById("panel-active");
      active.style.display = "flex";
      document.getElementById("panel-name").textContent = data.visitorName || "Visitor";
      document.getElementById("panel-email").textContent = data.visitorEmail || "";
      document.getElementById("messages-area").innerHTML = "";
      renderedIds.clear();

      window._fbUpdateDoc(window._fbDoc(window._db, "conversations", id), { unread: false });

      if (msgUnsubscribe) msgUnsubscribe();
      const messageQuery = window._fbQuery(
        window._fbCol(window._db, "conversations", id, "messages"),
        window._fbOrderBy("timestamp", "asc")
      );

      msgUnsubscribe = window._fbOnSnapshot(messageQuery, snapshot => {
        snapshot.docChanges().forEach(change => {
          if (change.type === "added") renderAdminMsg(change.doc.data(), change.doc.id);
        });
      });

      document.getElementById("reply-input").focus();
    }

    function renderAdminMsg(msg, id) {
      if (renderedIds.has(id)) return;
      renderedIds.add(id);

      const area = document.getElementById("messages-area");
      const role = msg.sender === "dexter" ? "dexter" : msg.sender === "visitor" ? "visitor" : "bot";
      const wrap = document.createElement("div");
      wrap.className = `msg ${role}`;

      const avatar = document.createElement("div");
      avatar.className = "msg-avatar";
      avatar.textContent = role === "visitor" ? "V" : "D";

      const msgWrap = document.createElement("div");
      const bubble = document.createElement("div");
      bubble.className = "msg-bubble";
      bubble.textContent = msg.text;

      const meta = document.createElement("div");
      meta.className = "msg-meta";
      meta.textContent = msg.timestamp?.toDate
        ? msg.timestamp.toDate().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
        : "";

      msgWrap.appendChild(bubble);
      msgWrap.appendChild(meta);
      wrap.appendChild(avatar);
      wrap.appendChild(msgWrap);
      area.appendChild(wrap);
      area.scrollTop = area.scrollHeight;
    }

    async function sendReply() {
      const input = document.getElementById("reply-input");
      const text = input.value.trim();
      if (!text || !activeConvId) return;
      input.value = "";

      await window._fbAddDoc(window._fbCol(window._db, "conversations", activeConvId, "messages"), {
        sender: "dexter",
        text,
        timestamp: window._fbServerTs()
      });

      await window._fbUpdateDoc(window._fbDoc(window._db, "conversations", activeConvId), {
        lastMessage: `Dexter: ${text}`,
        updatedAt: window._fbServerTs()
      });
    }
  </script>
</body>
</html>
